
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skybound Adventurer - 2D Platformer</title>
    <style>
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --accent-color: #ff9a9e;
            --text-color: #ffffff;
            --bg-color: #1a1a2e;
            --ui-bg: rgba(22, 33, 62, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevent text selection during play */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Main Game Container */
        #game-wrapper {
            position: relative;
            width: 800px;
            height: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA); /* Sky background */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay Layer */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--ui-bg);
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #000;
            background: -webkit-linear-gradient(var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ddd;
        }

        .controls-hint {
            display: grid;
            grid-template-columns: auto auto;
            gap: 15px;
            margin-bottom: 30px;
            text-align: left;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
        }

        .key {
            background: #eee;
            color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-family: monospace;
            box-shadow: 0 2px 0 #999;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        /* HUD (Heads Up Display) */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 5;
        }

        /* Mobile Controls */
        #mobile-controls {
            display: none; /* Hidden by default on desktop */
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            justify-content: space-between;
            z-index: 8;
        }

        .touch-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.3);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            user-select: none;
        }

        .touch-btn:active {
            background: rgba(255,255,255,0.6);
        }

        .d-pad {
            display: flex;
            gap: 15px;
        }

        @media (max-width: 850px) {
            #game-wrapper {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
            #mobile-controls {
                display: flex;
            }
            .controls-hint {
                display: none; /* Hide keyboard hints on mobile */
            }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <!-- The Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- HUD -->
        <div id="hud">
            <div id="score-display">Coins: 0</div>
            <div id="lives-display">Lives: 3</div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="ui-layer">
            <h1>SKYBOUND ADVENTURER</h1>
            <p>Jump over gaps, stomp enemies, and collect coins!</p>
            
            <div class="controls-hint">
                <span><span class="key">←</span> <span class="key">→</span></span> <span>Move Left/Right</span>
                <span><span class="key">Space</span> or <span class="key">↑</span></span> <span>Jump</span>
                <span><span class="key">R</span></span> <span>Restart Level</span>
            </div>

            <button id="start-btn">PLAY NOW</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="ui-layer hidden">
            <h1 style="color: #ff6b6b; -webkit-text-fill-color: #ff6b6b;">GAME OVER</h1>
            <p id="final-score">You collected 0 coins.</p>
            <button id="restart-btn">TRY AGAIN</button>
        </div>

        <!-- Victory Screen -->
        <div id="victory-screen" class="ui-layer hidden">
            <h1 style="color: #ffd700; -webkit-text-fill-color: #ffd700;">LEVEL CLEARED!</h1>
            <p>Great job! You reached the flag.</p>
            <button id="play-again-btn">PLAY AGAIN</button>
        </div>

        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <div class="d-pad">
                <div class="touch-btn" id="btn-left">←</div>
                <div class="touch-btn" id="btn-right">→</div>
            </div>
            <div class="touch-btn" id="btn-jump">↑</div>
        </div>
    </div>

<script>
/**
 * GAME ENGINE & LOGIC
 * 
 * This script handles:
 * 1. The Game Loop (Update & Draw)
 * 2. Physics (Gravity, Velocity, Collision)
 * 3. Entities (Player, Enemies, Platforms, Coins)
 * 4. Game State (Menu, Playing, GameOver, Victory)
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// UI Elements
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const victoryScreen = document.getElementById('victory-screen');
const scoreDisplay = document.getElementById('score-display');
const livesDisplay = document.getElementById('lives-display');
const finalScoreText = document.getElementById('final-score');

// Game Constants
const GRAVITY = 0.6;
const FRICTION = 0.8;
const PLAYER_SPEED = 5;
const JUMP_FORCE = 14;

// Set canvas resolution (internal logic size)
canvas.width = 800;
canvas.height = 450;

// Input State
const keys = {
    right: false,
    left: false,
    up: false
};

// Game State Variables
let gameRunning = false;
let score = 0;
let lives = 3;
let animationId;
let cameraX = 0;

/**
 * CLASSES
 */

class Player {
    constructor() {
        this.width = 32;
        this.height = 32;
        this.reset();
    }

    reset() {
        this.x = 100;
        this.y = 200;
        this.vx = 0;
        this.vy = 0;
        this.grounded = false;
        this.isDead = false;
        this.facingRight = true;
    }

    update() {
        if (this.isDead) return;

        // Movement Logic
        if (keys.right) {
            this.vx += 1;
            this.facingRight = true;
        }
        if (keys.left) {
            this.vx -= 1;
            this.facingRight = false;
        }

        // Jump Logic
        if (keys.up && this.grounded) {
            this.vy = -JUMP_FORCE;
            this.grounded = false;
            createParticles(this.x + this.width/2, this.y + this.height, '#fff', 5);
        }

        // Physics Application
        this.vx *= FRICTION;
        this.vy += GRAVITY;

        // Cap speed
        if(this.vx > PLAYER_SPEED) this.vx = PLAYER_SPEED;
        if(this.vx < -PLAYER_SPEED) this.vx = -PLAYER_SPEED;

        // Apply Velocity
        this.x += this.vx;
        this.y += this.vy;

        // Basic floor collision (bottom of screen) - instant death pit
        if (this.y > canvas.height + 100) {
            die();
        }
    }

    draw() {
        if (this.isDead) return;

        ctx.save();
        ctx.translate(-cameraX, 0); // Apply camera scroll
        
        // Draw Body (Blue Square)
        ctx.fillStyle = '#4facfe';
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // Draw Eyes (to show direction)
        ctx.fillStyle = 'white';
        const eyeOffset = this.facingRight ? 18 : 4;
        ctx.fillRect(this.x + eyeOffset, this.y + 6, 8, 8);
        ctx.fillStyle = 'black';
        const pupilOffset = this.facingRight ? 22 : 4;
        ctx.fillRect(this.x + pupilOffset, this.y + 8, 4, 4);

        // Draw Scarf/Accessory for detail
        ctx.fillStyle = '#ff9a9e';
        ctx.fillRect(this.x + 4, this.y + 24, 24, 4);
        if (Math.abs(this.vx) > 1) {
            // Animate scarf based on speed
            const scarfWave = Math.sin(Date.now() / 50) * 5;
            ctx.fillRect(this.x + (this.facingRight ? -10 : 30) + scarfWave, this.y + 24, 10, 4);
        }

        ctx.restore();
    }
}

class Platform {
    constructor(x, y, w, h) {
        this.x = x;
        this.y = y;
        this.width = w;
        this.height = h;
    }

    draw() {
        ctx.save();
        ctx.translate(-cameraX, 0);
        
        // Grass top
        ctx.fillStyle = '#4cd137';
        ctx.fillRect(this.x, this.y, this.width, 10);
        // Dirt body
        ctx.fillStyle = '#8c7ae6'; // Stylish purple dirt
        ctx.fillRect(this.x, this.y + 10, this.width, this.height - 10);
        
        // Decorative border
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.width, this.height);

        ctx.restore();
    }
}

class Enemy {
    constructor(x, y, range) {
        this.startX = x;
        this.x = x;
        this.y = y;
        this.width = 30;
        this.height = 30;
        this.range = range;
        this.speed = 2;
        this.direction = 1;
        this.vx = this.speed;
    }

    update() {
        this.x += this.vx;

        // Patrol logic
        if (this.x > this.startX + this.range) {
            this.vx = -this.speed;
        } else if (this.x < this.startX) {
            this.vx = this.speed;
        }
    }

    draw() {
        ctx.save();
        ctx.translate(-cameraX, 0);

        // Slime body
        ctx.fillStyle = '#e84118';
        ctx.beginPath();
        ctx.arc(this.x + this.width/2, this.y + this.height/2 + 5, this.width/2, Math.PI, 0); // Semi-circle top
        ctx.lineTo(this.x + this.width, this.y + this.height);
        ctx.lineTo(this.x, this.y + this.height);
        ctx.fill();

        // Angry Eyes
        ctx.fillStyle = 'white';
        ctx.fillRect(this.x + 5, this.y + 10, 8, 8);
        ctx.fillRect(this.x + 18, this.y + 10, 8, 8);
        ctx.fillStyle = 'black';
        // Look towards direction
        const pupilDir = this.vx > 0 ? 2 : -2;
        ctx.fillRect(this.x + 7 + pupilDir, this.y + 12, 4, 4);
        ctx.fillRect(this.x + 20 + pupilDir, this.y + 12, 4, 4);

        ctx.restore();
    }
}

class Coin {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 20;
        this.height = 20;
        this.collected = false;
        this.floatOffset = Math.random() * Math.PI * 2;
    }

    update() {
        // Bobbing animation
        this.floatOffset += 0.1;
    }

    draw() {
        if (this.collected) return;

        const bobY = Math.sin(this.floatOffset) * 5;

        ctx.save();
        ctx.translate(-cameraX, 0);

        ctx.fillStyle = '#fbc531';
        ctx.beginPath();
        ctx.arc(this.x + 10, this.y + 10 + bobY, 10, 0, Math.PI * 2);
        ctx.fill();
        
        // Shine effect
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x + 7, this.y + 7 + bobY, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}

class Flag {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 10;
        this.height = 100;
    }

    draw() {
        ctx.save();
        ctx.translate(-cameraX, 0);

        // Pole
        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(this.x, this.y - 100, this.width, 100);

        // Flag
        ctx.fillStyle = '#e1b12c';
        ctx.beginPath();
        ctx.moveTo(this.x + 10, this.y - 100);
        ctx.lineTo(this.x + 60, this.y - 80);
        ctx.lineTo(this.x + 10, this.y - 60);
        ctx.fill();

        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 5 + 2;
        this.speedX = Math.random() * 4 - 2;
        this.speedY = Math.random() * 4 - 2;
        this.color = color;
        this.life = 1.0;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life -= 0.05;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.translate(-cameraX, 0);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.restore();
    }
}

/**
 * GAME DATA & SETUP
 */

const player = new Player();
let platforms = [];
let enemies = [];
let coins = [];
let particles = [];
let flag;

function initLevel() {
    platforms = [];
    enemies = [];
    coins = [];
    particles = [];

    // Ground segments
    platforms.push(new Platform(0, 400, 1000, 50));  // Start area
    platforms.push(new Platform(1200, 400, 600, 50)); // Gap 1
    platforms.push(new Platform(1900, 350, 200, 50)); // High platform
    platforms.push(new Platform(2200, 400, 800, 50)); // Long run
    
    // Floating platforms
    platforms.push(new Platform(2400, 280, 150, 20));
    platforms.push(new Platform(2700, 200, 150, 20));
    platforms.push(new Platform(3000, 400, 1000, 50)); // Ground before enemies

    // Steps
    platforms.push(new Platform(4100, 350, 100, 50));
    platforms.push(new Platform(4200, 300, 100, 50));
    platforms.push(new Platform(4300, 250, 100, 50));
    
    // Final run
    platforms.push(new Platform(4500, 400, 800, 50));

    // Goal
    flag = new Flag(5200, 400);

    // Enemies
    enemies.push(new Enemy(1300, 370, 300));
    enemies.push(new Enemy(1400, 370, 300));
    enemies.push(new Enemy(3000, 370, 600));
    enemies.push(new Enemy(3300, 370, 600));
    enemies.push(new Enemy(4600, 370, 200));

    // Coins
    createCoinPath(300, 350, 5); // First coins
    createCoinPath(1950, 300, 5); // High platform
    createCoinPath(2750, 150, 5); // High jump
    createCoinPath(2400, 230, 3); // Floating
}

function createCoinPath(startX, startY, count) {
    for(let i=0; i<count; i++) {
        coins.push(new Coin(startX + (i * 40), startY));
    }
}

/**
 * CORE LOGIC
 */

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function checkCollisions() {
    // Platform Collisions
    player.grounded = false;
    for (let p of platforms) {
        // Simple AABB collision
        // We check if player is falling into the platform
        if (player.x < p.x + p.width &&
            player.x + player.width > p.x &&
            player.y + player.height > p.y &&
            player.y + player.height < p.y + p.height + 20 /* Tolerance */ &&
            player.vy >= 0) {
                
                player.grounded = true;
                player.vy = 0;
                player.y = p.y - player.height;
        }
    }

    // Enemy Collisions
    for (let e of enemies) {
        if (rectIntersect(player.x, player.y, player.width, player.height, e.x, e.y, e.width, e.height)) {
            // Mario logic: If falling from above, kill enemy. Otherwise, player dies.
            if (player.vy > 0 && player.y + player.height < e.y + e.height / 2 + 10) {
                // Kill enemy
                e.x = -9999; // Move off screen
                player.vy = -10; // Bounce
                score += 50;
                scoreDisplay.innerText = "Coins: " + score;
                createParticles(player.x, player.y + player.height, '#e84118', 10);
            } else {
                die();
            }
        }
    }

    // Coin Collisions
    for (let c of coins) {
        if (!c.collected && 
            rectIntersect(player.x, player.y, player.width, player.height, c.x, c.y, c.width, c.height)) {
            c.collected = true;
            score += 10;
            scoreDisplay.innerText = "Coins: " + score;
            createParticles(c.x, c.y, '#fbc531', 5);
        }
    }

    // Flag Collision (Victory)
    if (rectIntersect(player.x, player.y, player.width, player.height, flag.x, flag.y - 100, flag.width + 60, flag.height)) {
        victory();
    }
}

function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
}

function die() {
    lives--;
    livesDisplay.innerText = "Lives: " + lives;
    
    if (lives > 0) {
        // Respawn logic
        player.reset();
        // Adjust camera back
        cameraX = 0;
    } else {
        gameOver();
    }
}

function gameOver() {
    gameRunning = false;
    finalScoreText.innerText = "You collected " + score + " coins.";
    gameOverScreen.classList.remove('hidden');
}

function victory() {
    gameRunning = false;
    victoryScreen.classList.remove('hidden');
}

function resetGame() {
    score = 0;
    lives = 3;
    scoreDisplay.innerText = "Coins: 0";
    livesDisplay.innerText = "Lives: 3";
    player.reset();
    initLevel();
    cameraX = 0;
    gameRunning = true;
    
    // UI Handling
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    victoryScreen.classList.add('hidden');

    // Start Loop if not running
    if (!animationId) {
        gameLoop();
    }
}

/**
 * MAIN LOOP
 */

function update() {
    if (!gameRunning) return;

    player.update();
    
    // Update enemies
    enemies.forEach(e => e.update());
    
    // Update coins (animation)
    coins.forEach(c => c.update());
    
    // Update particles
    particles.forEach((p, index) => {
        p.update();
        if (p.life <= 0) particles.splice(index, 1);
    });

    checkCollisions();

    // Camera Logic (Keep player in left 1/3 of screen)
    // Smooth camera interpolation could go here, but direct assignment is snappier
    let targetCamX = player.x - canvas.width / 3;
    
    // Clamp camera so it doesn't show left of 0
    if (targetCamX < 0) targetCamX = 0;
    
    // Clamp camera so it doesn't go past end (approximate)
    if (targetCamX > 5000) targetCamX = 5000;

    cameraX = targetCamX;
}

function draw() {
    // Clear Canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // Background clouds (parallax effect)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.arc(100 - (cameraX * 0.2) % 900, 100, 40, 0, Math.PI*2);
    ctx.arc(160 - (cameraX * 0.2) % 900, 120, 50, 0, Math.PI*2);
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(500 - (cameraX * 0.5) % 900, 80, 60, 0, Math.PI*2);
    ctx.arc(600 - (cameraX * 0.5) % 900, 90, 50, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Draw Game Objects
    flag.draw();
    platforms.forEach(p => p.draw());
    coins.forEach(c => c.draw());
    enemies.forEach(e => e.draw());
    player.draw();
    particles.forEach(p => p.draw());
}

function gameLoop() {
    update();
    draw();
    animationId = requestAnimationFrame(gameLoop);
}

/**
 * EVENT LISTENERS
 */

// Keyboard
window.addEventListener('keydown', e => {
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') keys.up = true;
    if (e.code === 'KeyR' && !gameRunning) resetGame();
});

window.addEventListener('keyup', e => {
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') keys.up = false;
});

// Touch (Mobile)
const btnLeft = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');
const btnJump = document.getElementById('btn-jump');

const addTouch = (elem, code) => {
    elem.addEventListener('touchstart', (e) => { e.preventDefault(); window.dispatchEvent(new KeyboardEvent('keydown', {'code': code})); });
    elem.addEventListener('touchend', (e) => { e.preventDefault(); window.dispatchEvent(new KeyboardEvent('keyup', {'code': code})); });
};

addTouch(btnLeft, 'ArrowLeft');
addTouch(btnRight, 'ArrowRight');
addTouch(btnJump, 'Space');

// UI Buttons
document.getElementById('start-btn').addEventListener('click', resetGame);
document.getElementById('restart-btn').addEventListener('click', resetGame);
document.getElementById('play-again-btn').addEventListener('click', resetGame);

// Initial Draw
initLevel();
draw();

</script>
</body>
</html>
